@if(hotel) {
<mat-card
  class="group overflow-hidden hover:shadow-2xl transition-all duration-500 border-0 !bg-white shadow-md hover:-translate-y-1"
>
  <div
    class="relative h-64 overflow-hidden bg-gradient-to-br from-blue-100 to-blue-50"
  >
    <img
      [src]="hotel.image"
      [alt]="hotel.name"
      (error)="onImageError($event)"
      class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
    />
    <div
      class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/0 to-black/0"
    ></div>

    <div class="absolute top-4 right-4">
      <div
        class="bg-white/95 backdrop-blur-sm text-blue-900 border-0 rounded-full shadow-lg px-3 py-1 gap-1 flex"
      >
        @for(star of [].constructor(hotel.stars); track $index) {
        <mat-icon class="fill-yellow-400 text-yellow-400 text-base">
          star
        </mat-icon>
        }
      </div>
    </div>

    <div class="absolute top-4 left-4">
      <div
        class="bg-blue-600 text-white border-0 rounded-full shadow-lg px-3 py-1 gap-1 flex justify-center items-center"
      >
        <mat-icon class="fill-white text-white text-base">star</mat-icon>
        {{ hotel.rate.toFixed(1) }}
      </div>
    </div>
  </div>

  <div class="p-6">
    <h3
      class="mb-3 text-gray-900 group-hover:text-blue-600 transition-colors font-semibold text-lg"
    >
      {{ hotel.name }}
    </h3>

    <div class="flex items-center gap-2 mb-6 text-gray-600">
      <mat-icon class="w-4 h-4 text-blue-500 mt-0.5 flex-shrink-0"
        >location_on</mat-icon
      >
      <span class="text-sm leading-relaxed">{{ hotel.address }}</span>
    </div>

    <div
      class="flex items-center justify-between pt-4 border-t border-gray-100"
    >
      <div class="flex flex-col">
        <span class="text-xs text-gray-500 mb-1">Desde</span>
        <div class="flex items-baseline gap-1">
          <mat-icon class="w-4 h-4 text-blue-600">euro</mat-icon>
          <span class="text-2xl font-bold text-blue-600">{{
            hotel.price
          }}</span>
          <span class="text-sm text-gray-500">/noche</span>
        </div>
      </div>
      <button
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 flex justify-center items-center rounded shadow-md transition-all group/btn"
      >
        Ver más
        <mat-icon
          class="w-4 h-4 ml-1 group-hover/btn:translate-x-1 transition-transform inline"
          >arrow_right</mat-icon
        >
      </button>
    </div>
  </div>
</mat-card>
}
